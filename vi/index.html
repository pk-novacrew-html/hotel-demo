<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Việt Tín Hotel — Trang chủ</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <script src="../assets/js/theme-init.js"></script>
</head>
<body data-page="home">
  <header class="site-header" id="site-header"></header>
  <nav class="nav-mobile" id="nav-mobile"></nav>

  <section class="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 id="hero-title"></h1>
      <p id="hero-subtitle"></p>
    </div>
    <div class="scroll-indicator">
      <svg width="24" height="36" viewBox="0 0 24 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="22" height="34" rx="11" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="12" cy="10" r="3" fill="currentColor" class="scroll-wheel"/>
      </svg>
    </div>
  </section>

  <section class="section section--narrow">
    <span class="section-label" id="intro-label"></span>
    <h2 id="intro-title"></h2>
    <p id="intro-text"></p>
    <div class="cta-row">
      <a href="rooms.html" class="btn" id="cta-rooms"></a>
      <a href="booking.html" class="btn btn--primary" id="cta-booking"></a>
    </div>
  </section>

  <section class="section section--compact">
    <div class="highlights" id="home-highlights"></div>
  </section>

  <section class="section">
    <div class="section-head" id="rooms-section-head"></div>
    <div class="grid-cards" id="rooms-preview"></div>
  </section>

  <section class="section section--flush" id="home-dining-wrap"></section>

  <section class="section">
    <div class="section-head" id="exp-section-head"></div>
    <div id="home-experiences"></div>
  </section>

  <section class="section section--narrow home-quote-wrap">
    <blockquote class="home-quote" id="home-quote"></blockquote>
  </section>

  <section class="cta-band" id="home-cta"></section>

  <footer class="site-footer" id="site-footer"></footer>
  <span class="demo-badge">Demo</span>
  <script src="../assets/js/main.js"></script>
</body>
</html>
