<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đặt phòng — Serenity Hotel</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <script src="../assets/js/theme-init.js"></script>
</head>
<body data-page="booking">
  <header class="site-header" id="site-header"></header>
  <nav class="nav-mobile" id="nav-mobile"></nav>

  <section class="hero hero--short">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 id="booking-title">Đặt phòng</h1>
    </div>
  </section>

  <section class="form-section">
    <p class="form-note" id="booking-note"></p>
    <div class="form-success" id="booking-success"></div>
    <div class="form-error" id="booking-error"></div>
    <form id="booking-form">
      <div class="form-group">
        <label for="checkin">Ngày đến</label>
        <input type="date" id="checkin" name="checkin" required>
      </div>
      <div class="form-group">
        <label for="checkout">Ngày đi</label>
        <input type="date" id="checkout" name="checkout" required>
      </div>
      <div class="form-group">
        <label for="guests">Số khách</label>
        <select id="guests" name="guests" required>
          <option value="1">1</option>
          <option value="2" selected>2</option>
          <option value="3">3</option>
          <option value="4">4+</option>
        </select>
      </div>
      <div class="form-group">
        <label for="room-type">Loại phòng</label>
        <select id="room-type" name="room-type" required></select>
      </div>
      <div class="form-group">
        <label for="b-name">Họ tên</label>
        <input type="text" id="b-name" name="name" required>
      </div>
      <div class="form-group">
        <label for="b-email">Email</label>
        <input type="email" id="b-email" name="email" required>
      </div>
      <div class="form-group">
        <label for="b-phone">Điện thoại</label>
        <input type="tel" id="b-phone" name="phone" required>
      </div>
      <div class="form-group">
        <label for="notes">Ghi chú</label>
        <textarea id="notes" name="notes" rows="3"></textarea>
      </div>
      <button type="submit" class="btn btn--primary">Gửi yêu cầu đặt phòng</button>
    </form>
  </section>

  <footer class="site-footer" id="site-footer"></footer>
  <span class="demo-badge">Demo</span>
  <script src="../assets/js/main.js"></script>
</body>
</html>
