<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dining — Serenity Hotel</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <script src="../assets/js/theme-init.js"></script>
</head>
<body data-page="dining">
  <header class="site-header" id="site-header"></header>
  <nav class="nav-mobile" id="nav-mobile"></nav>

  <section class="hero hero--short">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 id="dining-hero-title">Dining</h1>
      <p id="dining-hero-subtitle">Refined flavours</p>
    </div>
  </section>

  <div class="dining-page-wrap">
    <div id="dining-sections"></div>
  </div>

  <footer class="site-footer" id="site-footer"></footer>
  <span class="demo-badge">Demo</span>
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox__content">
      <button type="button" class="lightbox__close" aria-label="Close">&times;</button>
      <button type="button" class="lightbox__prev" aria-label="Previous">&#8249;</button>
      <img class="lightbox__img" src="" alt="" />
      <button type="button" class="lightbox__next" aria-label="Next">&#8250;</button>
      <p class="lightbox__counter"></p>
    </div>
  </div>
  <script src="../assets/js/main.js"></script>
</body>
</html>
