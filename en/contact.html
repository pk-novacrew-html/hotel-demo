<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Serenity Hotel</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <script src="../assets/js/theme-init.js"></script>
</head>
<body data-page="contact">
  <header class="site-header" id="site-header"></header>
  <nav class="nav-mobile" id="nav-mobile"></nav>
  <section class="hero hero--short">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content"><h1 id="contact-title">Contact</h1></div>
  </section>
  <section class="form-section">
    <div class="form-success" id="contact-success"></div>
    <form id="contact-form">
      <div class="form-group"><label for="name">Name</label><input type="text" id="name" required></div>
      <div class="form-group"><label for="email">Email</label><input type="email" id="email" required></div>
      <div class="form-group"><label for="message">Message</label><textarea id="message" rows="5" required></textarea></div>
      <button type="submit" class="btn btn--primary">Send message</button>
    </form>
  </section>
  <footer class="site-footer" id="site-footer"></footer>
  <span class="demo-badge">Demo</span>
  <script src="../assets/js/main.js"></script>
</body>
</html>
