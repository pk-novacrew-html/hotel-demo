<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rooms — Serenity Hotel</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <script src="../assets/js/theme-init.js"></script>
</head>
<body data-page="rooms">
  <header class="site-header" id="site-header"></header>
  <nav class="nav-mobile" id="nav-mobile"></nav>

  <section class="hero hero--short">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 id="rooms-hero-title">Rooms & Suites</h1>
      <p id="rooms-hero-subtitle">Tranquil living spaces</p>
    </div>
  </section>

  <section class="intro-band">
    <div class="container">
      <div class="intro-band__inner">
        <span class="section-label" id="rooms-intro-label">Việt Tín Hotel</span>
        <h2 id="rooms-intro-title">Where you rediscover serenity</h2>
        <p id="rooms-intro-text" class="intro-text"></p>
      </div>
    </div>
  </section>

  <section id="rooms-section">
    <div id="rooms-grid"></div>
  </section>

  <section class="section section--alt">
    <div class="container">
      <div class="section-head">
        <div class="section-head__text">
          <span class="section-label" id="rooms-why-label">Why choose us</span>
          <h2 id="rooms-why-title">Experience beyond expectations</h2>
        </div>
      </div>
      <div id="rooms-why-grid" class="grid-cards grid-cards--2 grid-cards--highlight"></div>
    </div>
  </section>

  <section class="cta-band" id="rooms-cta"></section>

  <footer class="site-footer" id="site-footer"></footer>
  <span class="demo-badge">Demo</span>

  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="View image">
    <div class="lightbox__content">
      <button class="lightbox__close" aria-label="Close">&times;</button>
      <button class="lightbox__prev" aria-label="Previous">&#10094;</button>
      <img class="lightbox__img" src="" alt="">
      <button class="lightbox__next" aria-label="Next">&#10095;</button>
      <div class="lightbox__counter"></div>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
</body>
</html>
