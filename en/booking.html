<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book — Serenity Hotel</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <script src="../assets/js/theme-init.js"></script>
</head>
<body data-page="booking">
  <header class="site-header" id="site-header"></header>
  <nav class="nav-mobile" id="nav-mobile"></nav>
  <section class="hero hero--short">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content"><h1 id="booking-title">Reservation</h1></div>
  </section>
  <section class="form-section">
    <p class="form-note" id="booking-note"></p>
    <div class="form-success" id="booking-success"></div>
    <div class="form-error" id="booking-error"></div>
    <form id="booking-form">
      <div class="form-group"><label for="checkin">Check-in</label><input type="date" id="checkin" required></div>
      <div class="form-group"><label for="checkout">Check-out</label><input type="date" id="checkout" required></div>
      <div class="form-group"><label for="guests">Guests</label>
        <select id="guests" required><option value="1">1</option><option value="2" selected>2</option><option value="3">3</option><option value="4">4+</option></select>
      </div>
      <div class="form-group"><label for="room-type">Room type</label><select id="room-type" required></select></div>
      <div class="form-group"><label for="b-name">Name</label><input type="text" id="b-name" required></div>
      <div class="form-group"><label for="b-email">Email</label><input type="email" id="b-email" required></div>
      <div class="form-group"><label for="b-phone">Phone</label><input type="tel" id="b-phone" required></div>
      <div class="form-group"><label for="notes">Notes</label><textarea id="notes" rows="3"></textarea></div>
      <button type="submit" class="btn btn--primary">Submit request</button>
    </form>
  </section>
  <footer class="site-footer" id="site-footer"></footer>
  <span class="demo-badge">Demo</span>
  <script src="../assets/js/main.js"></script>
</body>
</html>
